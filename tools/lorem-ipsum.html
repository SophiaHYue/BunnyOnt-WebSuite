<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>BunnyOnt | Lorem Ipsum Generator</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background-color: #f9f9f9;
      font-family: 'Noto Sans TC', sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #222;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header img {
      height: 40px;
    }
    header h1 {
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      margin: 0;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    .tool-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 30px;
      margin: 40px auto;
      max-width: 700px;
      text-align: center;
    }
    .tool-box input {
      width: 80px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px;
      font-size: 14px;
      margin-right: 10px;
      text-align: center;
    }
    .tool-box button {
      background-color: #ff4d4d;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .tool-box button:hover {
      background-color: #e63939;
    }
    #result {
      margin-top: 20px;
      text-align: left;
      background: #f7f7f7;
      padding: 15px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <!-- 品牌導覽列 -->
  <header>
    <img src="../assets/logo/bunnyont-logo.png" alt="BunnyOnt Logo">
    <h1>BunnyOnt 工具中心</h1>
    <nav>
      <a href="../index.html">🏠 回首頁</a>
    </nav>
  </header>

  <!-- 工具內容 -->
  <div class="tool-box">
    <h2>Lorem Ipsum Generator</h2>
    <p>輸入段落數量，生成隨機文字。</p>

    <!-- 輸入區 -->
    <input type="number" id="paragraphs" min="1" max="10" value="3">
    <button id="generateBtn">生成文字</button>

    <!-- 結果區 -->
    <div id="result"></div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    // BunnyOnt Lorem Ipsum 工具互動邏輯
    const loremText = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.";

    document.getElementById("generateBtn").addEventListener("click", () => {
      const count = parseInt(document.getElementById("paragraphs").value, 10);
      let output = "";
      if (!count || count < 1) {
        document.getElementById("result").innerHTML = "<p style='color:red;'>請輸入有效的段落數量。</p>";
      } else {
        for (let i = 0; i < count; i++) {
          output += "<p>" + loremText + "</p>";
        }
        document.getElementById("result").innerHTML = output;
      }
    });
  </script>
</body>
</html>
